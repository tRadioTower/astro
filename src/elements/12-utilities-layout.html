<template data-title=".u-clearfix" data-id="u-clearfix" data-copy="class=&quot;u-clearfix&quot;">

  <p class="utility-class__name"><code>.u-clearfix</code></p>
  <pre class="utility-class__rule"><code>clear: both;
content: "";
display: block;</code></pre>

  </div>
</div>
</template>
